# Render Blueprint — A股自选股智能分析系统

services:
  - type: web
    name: stock-analyzer
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py --serve-only --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: API_PORT
        value: 8000
      - key: TUSHARE_TOKEN
        sync: false
      - key: FEISHU_BOT_KEY
        sync: false
      - key: STOCK_LIST
        value: "600162,301581,600143,601985"
      - key: TZ
        value: Asia/Shanghai
      - key: LOG_LEVEL
        value: INFO
